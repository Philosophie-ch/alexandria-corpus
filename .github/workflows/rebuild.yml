name: Rebuild Production Data

on:
  release:
    types: [published]

# Required secrets:
#   ALEXANDRIA_URL        e.g. https://api.philosophie.ch
#   ALEXANDRIA_ADMIN_KEY  admin API key

jobs:
  rebuild:
    name: Wipe and reimport all data
    runs-on: ubuntu-latest
    env:
      API: ${{ secrets.ALEXANDRIA_URL }}
      TOKEN: ${{ secrets.ALEXANDRIA_ADMIN_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify data_version.yml exists
        run: test -f data_version.yml || (echo "ERROR: data_version.yml missing" && exit 1)

      # ── Version gate — fail before touching anything if version already deployed ──

      - name: Check version is new
        run: |
          NEW_VERSION=$(python3 -c "
          with open('data_version.yml') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('version:'):
                      print(line.split(':', 1)[1].strip().strip('\"'))
                      break
          ")
          echo "Releasing version: $NEW_VERSION"

          CURRENT=$(curl -sS --fail-with-body \
            "$API/api/v1/data-version?limit=1&sort=imported_at&order=desc" \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "
          import json, sys
          items = json.load(sys.stdin).get('items', [])
          print(items[0]['version'] if items else '')
          ")

          echo "Current DB version: ${CURRENT:-none}"
          if [ "$CURRENT" = "$NEW_VERSION" ]; then
            echo "ERROR: DB is already at version $NEW_VERSION — bump data_version.yml before releasing"
            exit 1
          fi

      # ── Wipe ────────────────────────────────────────────────────────────────────

      - name: Wipe all data tables
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/wipe?confirm=true" \
            -H "Authorization: Bearer $TOKEN"

      # ── Import entities ──────────────────────────────────────────────────────────

      - name: Import keywords
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/keywords" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/keyword/all.csv"

      - name: Import schools
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/schools" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/school/all.csv"

      - name: Import institutions
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/institutions" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/institution/all.csv"

      - name: Import series
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/series" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/series/all.csv"

      - name: Import publishers
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/publishers" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/publisher/all.csv"

      - name: Import journals
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/journals" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/journal/all.csv"

      # ── Import authors (merge split files → one call) ────────────────────────────

      - name: Import authors
        run: |
          OUT=$(mktemp /tmp/authors_XXXX.csv)
          first=1
          for f in data/author/*.csv; do
            [ -f "$f" ] || continue
            if [ $first -eq 1 ]; then cat "$f" > "$OUT"; first=0
            else tail -n +2 "$f" >> "$OUT"; fi
          done
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/authors" \
            -H "Authorization: Bearer $TOKEN" -F "file=@$OUT;type=text/csv"
          rm "$OUT"

      # ── Import bibitems (merge split files → one call) ───────────────────────────

      - name: Import bibitems
        run: |
          OUT=$(mktemp /tmp/bibitems_XXXX.csv)
          first=1
          for f in data/bibitem/*.csv; do
            [ -f "$f" ] || continue
            if [ $first -eq 1 ]; then cat "$f" > "$OUT"; first=0
            else tail -n +2 "$f" >> "$OUT"; fi
          done
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/bibitems" \
            -H "Authorization: Bearer $TOKEN" -F "file=@$OUT;type=text/csv"
          rm "$OUT"

      - name: Import bibitem refs
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/bibitem-refs" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/bibitem_refs/all.csv"

      - name: Recompute transitive deps
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/recompute-deps" \
            -H "Authorization: Bearer $TOKEN"

      - name: Import bibitem notes
        run: |
          curl -sS --fail-with-body -X POST "$API/api/v1/admin/import/bibitem-notes" \
            -H "Authorization: Bearer $TOKEN" -F "file=@data/bibitem_notes/all.csv"

      # ── Record data version ──────────────────────────────────────────────────────

      - name: Record data version
        run: |
          VERSION=$(python3 -c "
          with open('data_version.yml') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('version:'):
                      print(line.split(':', 1)[1].strip().strip('\"'))
                      break
          ")
          DESCRIPTION=$(python3 -c "
          with open('data_version.yml') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('description:'):
                      print(line.split(':', 1)[1].strip().strip('\"'))
                      break
          ")
          IMPORTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          curl -sS --fail-with-body -X POST "$API/api/v1/data-version" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --arg v "$VERSION" \
                  --arg d "$DESCRIPTION" \
                  --arg t "$IMPORTED_AT" \
                  '{version: $v, description: $d, imported_at: $t}')"
          echo "Recorded version $VERSION"
