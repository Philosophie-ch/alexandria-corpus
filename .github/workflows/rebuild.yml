name: Rebuild Production Data

on:
  release:
    types: [published]

# Required secrets:
#   PROD_HOST                  production server hostname/IP
#   PROD_USER                  SSH user on the production server
#   PROD_SSH_KEY               SSH private key for production server
#   ALEXANDRIA_SEED_API_KEY    admin API key (same secret as in alexandria-nexus)

jobs:
  rebuild:
    name: Wipe and reimport all data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify data_version.yml exists
        run: |
          test -f data_version.yml || (echo "ERROR: data_version.yml missing" && exit 1)

      - name: Extract new version
        id: version
        run: |
          VERSION=$(python3 -c "
          with open('data_version.yml') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('version:'):
                      print(line.split(':', 1)[1].strip().strip('\"'))
                      break
          ")
          echo "Releasing version: $VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rebuild data on production server
        uses: appleboy/ssh-action@v1
        env:
          NEW_VERSION: ${{ steps.version.outputs.value }}
          TOKEN: ${{ secrets.ALEXANDRIA_SEED_API_KEY }}
          CORPUS_REPO: https://github.com/Philosophie-ch/alexandria-corpus.git
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: NEW_VERSION,TOKEN,CORPUS_REPO
          script: |
            set -e

            # ── Version gate ──────────────────────────────────────────────────
            CURRENT=$(curl -sf \
              "http://localhost:8080/api/v1/data-version?limit=1&sort=imported_at&order=desc" \
              -H "Authorization: Bearer $TOKEN" \
              | python3 -c "
            import json, sys
            items = json.load(sys.stdin).get('items', [])
            print(items[0]['version'] if items else '')
            ")

            echo "Current DB version: ${CURRENT:-none}"
            echo "Releasing version:  $NEW_VERSION"

            if [ "$CURRENT" = "$NEW_VERSION" ]; then
              echo "ERROR: DB is already at version $NEW_VERSION — bump data_version.yml before releasing"
              exit 1
            fi

            # ── Clone corpus ──────────────────────────────────────────────────
            TMPDIR_CORPUS=$(mktemp -d /tmp/alx_corpus_XXXXXX)
            trap 'rm -rf "$TMPDIR_CORPUS"' EXIT

            git clone --depth 1 "$CORPUS_REPO" "$TMPDIR_CORPUS/corpus"

            # ── Wipe ──────────────────────────────────────────────────────────
            curl -sS --fail-with-body -X POST \
              "http://localhost:8080/api/v1/admin/wipe?confirm=true" \
              -H "Authorization: Bearer $TOKEN"

            # ── Import ────────────────────────────────────────────────────────
            "$TMPDIR_CORPUS/corpus/scripts/import-from-corpus.sh" \
              "http://localhost:8080" "$TOKEN"

            # ── Record version ────────────────────────────────────────────────
            "$TMPDIR_CORPUS/corpus/scripts/record-data-version.sh" \
              "http://localhost:8080" "$TOKEN"
